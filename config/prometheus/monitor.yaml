apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: controller-manager-metrics-monitor
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: multigres-operator
    app.kubernetes.io/component: monitoring
spec:
  endpoints:
    - port: https
      scheme: https
      path: /metrics
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      tlsConfig:
        insecureSkipVerify: true
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: multigres-operator
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: shard-pool-postgres-exporter
  labels:
    app.kubernetes.io/name: multigres-operator
    app.kubernetes.io/component: monitoring
spec:
  namespaceSelector:
    any: true
  selector:
    matchLabels:
      app.kubernetes.io/name: multigres
      app.kubernetes.io/component: shard-pool
  endpoints:
    - port: metrics
      scheme: http
      path: /metrics
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_annotation_multigres_com_project_ref]
          targetLabel: project
        - sourceLabels: [__meta_kubernetes_service_label_app_kubernetes_io_instance]
          targetLabel: cluster
        - targetLabel: component
          replacement: postgres-exporter
    - port: http
      scheme: http
      path: /metrics
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_annotation_multigres_com_project_ref]
          targetLabel: project
        - sourceLabels: [__meta_kubernetes_service_label_app_kubernetes_io_instance]
          targetLabel: cluster
        - targetLabel: component
          replacement: multipooler
    - port: pgctld-http
      scheme: http
      path: /metrics
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_annotation_multigres_com_project_ref]
          targetLabel: project
        - sourceLabels: [__meta_kubernetes_service_label_app_kubernetes_io_instance]
          targetLabel: cluster
        - targetLabel: component
          replacement: pgctld
---
