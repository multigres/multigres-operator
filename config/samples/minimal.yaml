# Postgres superuser password. The operator reads this Secret (referenced by
# spec.postgresPasswordSecretRef) to set the postgres password. It must exist
# in the cluster's namespace. Replace the demo value before any real use.
apiVersion: v1
kind: Secret
metadata:
  name: multigres-admin-password
  namespace: default
type: Opaque
stringData:
  password: postgres
---
apiVersion: multigres.com/v1alpha1
kind: MultigresCluster
metadata:
  name: minimal
  namespace: default
spec:
  postgresPasswordSecretRef:
    name: multigres-admin-password
    key: password
  pvcDeletionPolicy:
    whenDeleted: Delete
    whenScaled: Delete
  # A minimal cluster requires at least one cell definition.
  #
  # The operator will resolve configuration defaults in this order:
  # 1. Namespace Defaults: If a template named "default" exists in this namespace
  #    (e.g., CoreTemplate/default, CellTemplate/default), it will be used.
  # 2. Hardcoded Defaults: If no template is found, the operator injects:
  #    - Default GlobalTopoServer (Managed Etcd, 3 replicas)
  #    - Default MultiAdmin (1 replica)
  #    - Default Database ("postgres") with Default TableGroup ("default")
  cells:
    - name: "zone-a"
      zoneId: us-central1-a
      # zone: "us-east-1a"
