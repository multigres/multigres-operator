apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-pg-config
  namespace: default
data:
  postgresql.conf: |
    # Custom PostgreSQL configuration for exerciser testing.
    # These lines are appended to pgctld's auto-tuned postgresql.conf via
    # POSTGRES_INITDB_EXTRA_CONF; PostgreSQL's last-write-wins rule lets each
    # assignment below override the matching auto-tuned value.

    # Override shared_buffers from the default auto-tuned value
    shared_buffers = '256MB'

    # Override work_mem
    work_mem = '16MB'

    # Override max_connections
    max_connections = 50
